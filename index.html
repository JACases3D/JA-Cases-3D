<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Áurea Case</title>
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

header p {
    color: #aaa;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.product {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.02);
    background: #222;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

select {
    background: #333;
    color: white;
}

button {
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #d4af37;
}
</style>
</head>
<body>

<header>
    <h1>Áurea Case</h1>
    <p>Protección premium para tu iPhone</p>
</header>

<div class="container">
    <div class="product">
        <h2>Selecciona tu modelo</h2>
        <select>
            <option>iPhone 11</option>
            <option>iPhone 11 Pro</option>
            <option>iPhone 11 Pro Max</option>
            <option>iPhone 12</option>
            <option>iPhone 12 Pro</option>
            <option>iPhone 12 Pro Max</option>
            <option>iPhone 13</option>
            <option>iPhone 13 Pro</option>
            <option>iPhone 13 Pro Max</option>
            <option>iPhone 14</option>
            <option>iPhone 14 Pro</option>
            <option>iPhone 14 Pro Max</option>
            <option>iPhone 15</option>
            <option>iPhone 15 Pro</option>
            <option>iPhone 15 Pro Max</option>
            <option>iPhone 16</option>
            <option>iPhone 16 Pro</option>
            <option>iPhone 16 Pro Max</option>
            <option>iPhone 17</option>
            <option>iPhone 17 Pro</option>
            <option>iPhone 17 Pro Max</option>
        </select>
        <button>Comprar Ahora</button>
    </div>
</div>

</body>
</html>
