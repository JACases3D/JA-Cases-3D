<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Áurea Case</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
}

header {
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-size: 50px;
    letter-spacing: 3px;
}

header p {
    color: #aaa;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.card img {
    width: 250px;
    border-radius: 20px;
    margin-bottom: 20px;
}

select, button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

select {
    background: #333;
    color: white;
}

button {
    background: linear-gradient(90deg, gold, #d4af37);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<header>
    <h1>Áurea Case</h1>
    <p>Protección premium. Diseño exclusivo.</p>
</header>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1603899122129-3dbd3b9b4a59" alt="Funda iPhone">

        <h2>Selecciona tu modelo</h2>

        <select>
            <option>iPhone 11</option>
            <option>iPhone 12</option>
            <option>iPhone 13</option>
            <option>iPhone 14</option>
            <option>iPhone 15</option>
            <option>iPhone 16</option>
            <option>iPhone 17</option>
        </select>

        <button>Comprar Ahora</button>
    </div>
</div>

</body>
</html>
